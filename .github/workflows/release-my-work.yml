name: Release PR

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && 'main' || '' }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & Build
        run: |
          npm ci || npm install
          npm run build

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Create or Update Release Pull Request
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: node dist/index.js release-pr

      - name: Extract version from merged PR branch
        id: version
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "version=${BRANCH#release/}" >> "$GITHUB_OUTPUT"

      - name: Create tag, changelog, release & delete branch
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node dist/index.js release-publish \
            --ver ${{ steps.version.outputs.version }} \
            --base main

name: Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & Build
        run: |
          npm ci || npm install
          npm run build

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Create or Update Release Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: node dist/index.js release-pr

      - name: Publish merged release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          VER=$(git log --merges --oneline -5 \
            | grep -oP 'release/\K\d+\.\d+\.\d+' \
            | head -1 || true)
          if [ -n "$VER" ]; then
            echo "Detected merged version: $VER"
            node dist/index.js release-publish --version "$VER"
          else
            echo "No merged release/ branch detected. Skipping publish."
          fi
